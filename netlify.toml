[build]
  command = "npx prisma generate && npm run quickbuild"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "AGENTS.md,README.md,USAGE.md,prisma/seed.ts,.netlify,.agents,tests,.agents/README.md,opencode.json"

[functions]
  directory = "netlify/functions"

[template]
  required-extensions = ["prisma-postgres"]

# Improve caching for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
