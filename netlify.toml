[build]
  command = "npx prisma generate && npm run quickbuild"
  publish = ".next"
  environment = { SECRETS_SCAN_OMIT_PATHS = "AGENTS.md,README.md,USAGE.md,prisma/seed.ts,.netlify,.agents,tests,.agents/README.md,opencode.json", ENVIRONMENT = "production", NODE_ENV = "production" }

[functions]
  directory = "netlify/functions"

[template]
  required-extensions = ["prisma-postgres"]
